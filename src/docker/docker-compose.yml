version: '3.8'

services:
  # Redis - 缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: oj-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # PostgreSQL - 生产数据库（可选，开发环境使用 SQLite）
  postgres:
    image: postgres:15-alpine
    container_name: oj-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oj}
      POSTGRES_USER: ${POSTGRES_USER:-oj}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oj_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oj}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - full  # 只在 docker-compose --profile full up 时启动

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

networks:
  default:
    name: oj-network
